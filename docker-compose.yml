version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: examprep_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: examprep_db
      POSTGRES_USER: examprep_user
      POSTGRES_PASSWORD: examprep_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examprep_user -d examprep_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
